name: Build and deploy

on:
  schedule:
    # Roughly hourly. GitHub may still delay scheduled runs under load, so
    # this avoids the congested top of the hour for a less-contended minute.
    - cron: "37 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one deploy at a time; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build static site
        env:
          NZ_API_KEY: ${{ secrets.NZ_API_KEY }}
          BIBS_NZ_API_KEY: ${{ secrets.BIBS_NZ_API_KEY }}
        run: uv run python build.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
